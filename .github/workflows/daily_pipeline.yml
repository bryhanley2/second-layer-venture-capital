name: Second Layer VC Pipeline — Daily Run

on:
  schedule:
    # Runs every day at 7:00 AM EST (12:00 UTC)
    - cron: '0 12 * * *'
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions UI anytime

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
         pip install anthropic requests gspread google-auth feedparser

      - name: Run Second Layer Pipeline
      env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
  EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
  EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
  GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
  GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
  GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
  GMAIL_USER: ${{ secrets.EMAIL_SENDER }}
  GMAIL_APP_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
  MIN_SCORE_PCT: "65"
        run: |
          python sourcer.py
